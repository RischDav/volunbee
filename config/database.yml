default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: LetsGoVolunteer
  host: localhost
  username: letsgovolunteer_user
  password: password

test:
  <<: *default
  database: LetsGoVolunteer_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
