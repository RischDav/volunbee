      title: "Datenschutzerklärung"
      section1:
        title: "1. Überblick"
        text: "Die folgenden Hinweise geben einen einfachen Überblick darüber, was mit Ihren personenbezogenen Daten passiert, wenn Sie diese Website besuchen. Personenbezogene Daten sind alle Daten, mit denen Sie persönlich identifiziert werden können."
      responsible:
        title: "Verantwortlich für die Datenverarbeitung"
        name: "Die TUM Campus Heilbronn gGmbH"
        address: "Bildungscampus 2, 74076 Heilbronn"
        country: "Deutschland"
      phone: "Telefon"
      email: "E-Mail"
      section2:
        title: "2. Arten der verarbeiteten Daten"
      data_type1: "Bestandsdaten (z.B. Namen, Adressen)"
      data_type2: "Kontaktdaten (z.B. E-Mail, Telefonnummern)"
      data_type3: "Inhaltsdaten (z.B. Texteingaben, Fotografien, Videos)"
      data_processing: "Wir verarbeiten ausschließlich Daten, die für die öffentliche Einsicht bestimmt sind. Private Daten, die einer Geheimhaltung bedürfen, werden nicht erfasst (ausgenommen sind Passwörter für den Login)."
      section3:
        title: "3. Zweck der Datenverarbeitung"
      data_processing_purpose: "Wir verarbeiten Ihre personenbezogenen Daten für folgende Zwecke:"
      purpose1: "Bereitstellung unserer Plattform zur Vernetzung von Studierenden mit ehrenamtlichen Vereinen"
      purpose2: "Sicherheit und Funktionalität unserer Website"
      purpose3: "Gesetzliche Verpflichtungen oder berechtigte Interessen"
      section4:
        title: "4. Rechtsgrundlagen"
      legal_basis: "Die Verarbeitung Ihrer Daten erfolgt auf Grundlage folgender Rechtsgrundlagen:"
      legal_basis1: "Einwilligung (Art. 6 Abs. 1 lit. a DSGVO)"
      legal_basis2: "Vertragserfüllung und vorvertragliche Anfragen (Art. 6 Abs. 1 lit. b DSGVO)"
      legal_basis3: "Rechtliche Verpflichtung (Art. 6 Abs. 1 lit. c DSGVO)"
      legal_basis4: "Berechtigte Interessen (Art. 6 Abs. 1 lit. f DSGVO)"
      section5:
        title: "5. Ihre Rechte"
      rights: "Sie haben jederzeit das Recht:"
      right1: "Auskunft über Ihre gespeicherten personenbezogenen Daten zu erhalten (Art. 15 DSGVO)"
      right2: "Die Berichtigung unrichtiger personenbezogener Daten zu verlangen (Art. 16 DSGVO)"
      right3: "Die Löschung Ihrer Daten zu verlangen (Art. 17 DSGVO)"
      right4: "Die Einschränkung der Verarbeitung zu verlangen (Art. 18 DSGVO)"
      right5: "Auf Datenübertragbarkeit (Art. 20 DSGVO)"
      right6: "Widerspruch gegen die Verarbeitung zu erheben (Art. 21 DSGVO)"
      right7: "Eine erteilte Einwilligung zu widerrufen"
      right8: "Beschwerde bei einer Aufsichtsbehörde einzureichen"
      section6:
        title: "6. Cookies"
      cookies: "Unsere Website verwendet Cookies. Das sind kleine Textdateien, die auf Ihrem Endgerät gespeichert werden. Einige sind notwendig, um die Website funktionsfähig zu halten, andere helfen uns, die Benutzerfreundlichkeit zu verbessern."
      section7:
        title: "7. Datensicherheit"
      security: "Wir treffen nach Maßgabe des Art. 32 DSGVO unter Berücksichtigung des Stands der Technik, der Implementierungskosten und der Art, des Umfangs, der Umstände und der Zwecke der Verarbeitung sowie der unterschiedlichen Eintrittswahrscheinlichkeit und Schwere des Risikos für die Rechte und Freiheiten natürlicher Personen, geeignete technische und organisatorische Maßnahmen, um ein dem Risiko angemessenes Schutzniveau zu gewährleisten."
      section8:
        title: "8. Änderungen der Datenschutzerklärung"
      changes: "Wir behalten uns vor, diese Datenschutzerklärung anzupassen, damit sie stets den aktuellen rechtlichen Anforderungen entspricht oder um Änderungen unserer Leistungen in der Datenschutzerklärung umzusetzen, z.B. bei der Einführung neuer Services."
      date: "Stand: 10. April 2025"
      section9:
        title: "9. Datenaufbewahrung"
      data_storage: "Wir speichern Ihre personenbezogenen Daten nur so lange, wie es für die Erfüllung des Zwecks erforderlich ist, für den sie erhoben wurden, oder wie es gesetzlich vorgeschrieben ist."
