    privacy:
      title: "Datenschutzerklärung"
      section1:
        title: "1. Überblick"
        text: "Die folgenden Hinweise geben einen einfachen Überblick darüber, was mit Ihren personenbezogenen Daten passiert, wenn Sie diese Website besuchen. Personenbezogene Daten sind alle Daten, mit denen Sie persönlich identifiziert werden können."
      responsible:
        title: "Verantwortlich für die Datenverarbeitung"
        name: "Förderverein der Studierenden am TUM Campus Heilbronn e.V."
        address: "Weipertstraße 8–10, 74076 Heilbronn"
        country: "Deutschland"
      phone: "Telefon"
      email: "E-Mail"
      section2:
        title: "2. Arten der verarbeiteten Daten"
        data_types:
          - "Bestandsdaten (z.B. Namen, Adressen)"
          - "Kontaktdaten (z.B. E-Mail, Telefonnummern)"
          - "Inhaltsdaten (z.B. Texteingaben, Fotografien, Videos)"
        processing_note: "Wir verarbeiten ausschließlich Daten, die für die öffentliche Einsicht bestimmt sind. Private Daten, die einer Geheimhaltung bedürfen, werden nicht erfasst (ausgenommen sind Passwörter für den Login)."
      section3:
        title: "3. Zweck der Datenverarbeitung"
        purposes:
          - "Bereitstellung unserer Plattform zur Vernetzung von Studierenden mit ehrenamtlichen Vereinen"
          - "Sicherheit und Funktionalität unserer Website"
          - "Gesetzliche Verpflichtungen oder berechtigte Interessen"
      section4:
        title: "4. Rechtsgrundlagen"
        legal_bases:
          - "Einwilligung (Art. 6 Abs. 1 lit. a DSGVO)"
          - "Vertragserfüllung und vorvertragliche Anfragen (Art. 6 Abs. 1 lit. b DSGVO)"
          - "Rechtliche Verpflichtung (Art. 6 Abs. 1 lit. c DSGVO)"
          - "Berechtigte Interessen (Art. 6 Abs. 1 lit. f DSGVO)"
      section5:
        title: "5. Ihre Rechte"
        rights:
          - "Auskunft über Ihre gespeicherten personenbezogenen Daten zu erhalten (Art. 15 DSGVO)"
          - "Die Berichtigung unrichtiger personenbezogener Daten zu verlangen (Art. 16 DSGVO)"
          - "Die Löschung Ihrer Daten zu verlangen (Art. 17 DSGVO)"
          - "Die Einschränkung der Verarbeitung zu verlangen (Art. 18 DSGVO)"
          - "Auf Datenübertragbarkeit (Art. 20 DSGVO)"
          - "Widerspruch gegen die Verarbeitung zu erheben (Art. 21 DSGVO)"
          - "Eine erteilte Einwilligung zu widerrufen"
          - "Beschwerde bei einer Aufsichtsbehörde einzureichen"
      section6:
        title: "6. Cookies"
        text: "Unsere Website verwendet Cookies. Das sind kleine Textdateien, die auf Ihrem Endgerät gespeichert werden. Einige sind notwendig, um die Website funktionsfähig zu halten, andere helfen uns, die Benutzerfreundlichkeit zu verbessern."
      section7:
        title: "7. Datensicherheit"
        text: "Wir treffen nach Maßgabe des Art. 32 DSGVO unter Berücksichtigung des Stands der Technik, der Implementierungskosten und der Art, des Umfangs, der Umstände und der Zwecke der Verarbeitung sowie der unterschiedlichen Eintrittswahrscheinlichkeit und Schwere des Risikos für die Rechte und Freiheiten natürlicher Personen, geeignete technische und organisatorische Maßnahmen, um ein dem Risiko angemessenes Schutzniveau zu gewährleisten."
      section8:
        title: "8. Änderungen der Datenschutzerklärung"
        text: "Wir behalten uns vor, diese Datenschutzerklärung anzupassen, damit sie stets den aktuellen rechtlichen Anforderungen entspricht oder um Änderungen unserer Leistungen in der Datenschutzerklärung umzusetzen, z.B. bei der Einführung neuer Services."
      section9:
        title: "9. Datenaufbewahrung"
        text: "Wir speichern Ihre personenbezogenen Daten nur so lange, wie es für die Erfüllung des Zwecks erforderlich ist, für den sie erhoben wurden, oder wie es gesetzlich vorgeschrieben ist."
