        country: "Germany"
      phone: "Phone"
      email: "Email"
      section2:
        title: "2. Types of Data Processed"
      data_type1: "Personal Data (e.g., name, address)"
      data_type2: "Contact Data (e.g., email, phone number)"
      data_type3: "Content Data (e.g., text inputs, photographs, videos)"
      data_processing: "We only process data intended for public access. Private data requiring confidentiality is not collected (except for login passwords)."
      section3:
        title: "3. Purpose of Data Processing"
      data_processing_purpose: "We process your personal data for the following purposes:"
      purpose1: "Provision of our platform for connecting students with volunteer organizations"
      purpose2: "Ensuring security and functionality of our website"
      purpose3: "Legal obligations or legitimate interests"
      section4:
        title: "4. Legal Basis"
      legal_basis: "The processing of your data is based on the following legal grounds:"
      legal_basis1: "Consent (Art. 6 (1)(a) GDPR)"
      legal_basis2: "Contract fulfillment and pre-contractual requests (Art. 6 (1)(b) GDPR)"
      legal_basis3: "Legal obligation (Art. 6 (1)(c) GDPR)"
      legal_basis4: "Legitimate interests (Art. 6 (1)(f) GDPR)"
      section5:
        title: "5. Your Rights"
      rights: "You have the right to:"
      right1: "Obtain information about your stored personal data (Art. 15 GDPR)"
      right2: "Request correction of incorrect personal data (Art. 16 GDPR)"
      right3: "Request deletion of your data (Art. 17 GDPR)"
      right4: "Request limitation of processing (Art. 18 GDPR)"
      right5: "Data portability (Art. 20 GDPR)"
      right6: "Object to processing (Art. 21 GDPR)"
      right7: "Withdraw consent given"
      right8: "File a complaint with a supervisory authority"
      section6:
        title: "6. Cookies"
      cookies: "Our website uses cookies. These are small text files stored on your device. Some are necessary to keep the website functional, while others help improve usability."
      section7:
        title: "7. Data Security"
      security: "We implement appropriate technical and organizational measures in accordance with Article 32 of the GDPR, considering the state of the art, implementation costs, and the nature, scope, context, and purposes of processing."
      section8:
        title: "8. Changes to Privacy Policy"
      changes: "We reserve the right to amend this privacy policy to comply with current legal requirements or to implement changes to our services in the privacy policy."
      date: "Date: April 10, 2025"
      section9:
        title: "9. Data Retention"
      data_storage: "We only retain your personal data as long as necessary for the purposes for which it was collected, or as required by law."
